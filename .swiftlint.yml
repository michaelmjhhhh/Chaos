# SwiftLint configuration for Chaos.
# Intentionally focused rather than maximal — catch real issues without drowning
# the small, already-consistent codebase in style noise. Tighten over time.

included:
  - Chaos
  - Tests

excluded:
  - .build

opt_in_rules:
  - empty_count
  - closure_spacing
  - operator_usage_whitespace

disabled_rules:
  - todo            # TODO/FIXME notes are allowed
  - trailing_comma  # multiline collections keep trailing commas (matches Package.swift)
  # SwiftFormat owns whitespace/brace layout — avoid fighting it here.
  - opening_brace
  - statement_position
  # Soft metrics: useful later, too noisy for the initial baseline.
  - cyclomatic_complexity
  - function_parameter_count

# Warning-only: long prose/prompt string literals (help text, the vision prompt)
# are intentionally not wrapped, so length never hard-fails the build.
line_length:
  warning: 160
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

# Short, local names like `f`, `q`, `df`, `m` are idiomatic here.
identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60

# A few views/state types are legitimately large.
type_body_length:
  warning: 600
  error: 800

file_length:
  warning: 700
  error: 1000

function_body_length:
  warning: 120
  error: 200
