name: CI

# Build and test on every push to main and on pull requests, so regressions are
# caught before they reach a release.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftformat swiftlint

      # Fails the build if any file isn't formatted (config: .swiftformat).
      - name: Format check
        run: swiftformat --lint .

      # Lints using .swiftlint.yml. Not --strict yet: warnings are advisory
      # for now and will be tightened once the baseline stays clean.
      - name: Lint
        run: swiftlint lint
